<title>Monument — Courage Festival 2026</title>

<style>
  :root {
    --bg:       #07111f;
    --surface:  #0f1e30;
    --surface2: #162840;
    --border:   #1e3a55;
    --gold:     #e8b84b;
    --gold-dim: #8a6a1f;
    --green:    #22c55e;
    --green-bg: #052512;
    --red:      #ef4444;
    --red-bg:   #200a0a;
    --blue:     #3b82f6;
    --blue-bg:  #071428;
    --muted:    #4a6480;
    --text:     #e8edf2;
    --text-dim: #7a9ab8;
    --radius:   12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(160deg, #0b1e35 0%, #071428 100%);
    border-bottom: 2px solid var(--gold);
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .school-logo {
    height: 52px;
    width: 52px;
    object-fit: contain;
    flex-shrink: 0;
    background: white;
    border-radius: 8px;
    padding: 3px;
  }
  .header-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 20px;
    color: var(--gold);
    line-height: 1;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .header-text p {
    font-size: 12px; color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* ── JOURNEY STRIP ── */
  .journey {
    padding: 14px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .journey-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .journey-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .j-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--surface);
    border-left: 3px solid var(--border);
    font-size: 13px;
  }
  .j-item.win  { border-left-color: var(--green); background: var(--green-bg); }
  .j-item.loss { border-left-color: var(--red);   background: var(--red-bg);   }
  .j-item.select-done { border-left-color: var(--blue); background: var(--blue-bg); }
  .j-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 11px;
    padding: 2px 7px; border-radius: 4px;
    flex-shrink: 0; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .win  .j-badge { background: var(--green); color: #052512; }
  .loss .j-badge { background: var(--red);   color: #200a0a; }
  .select-done .j-badge { background: var(--blue); color: #071428; }
  .j-text { color: var(--text-dim); flex: 1; line-height: 1.3; }
  .j-undo {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 16px; padding: 2px 4px;
    border-radius: 4px; flex-shrink: 0;
    transition: color 0.15s;
  }
  .j-undo:hover { color: var(--gold); }

  /* ── DIVIDER ── */
  .divider {
    margin: 16px 16px 0;
    border: none; border-top: 1px solid var(--border);
  }

  /* ── CURRENT CARD ── */
  .current-wrap {
    padding: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-phase {
    background: var(--surface2);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .phase-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 13px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .phase-time {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }

  /* match layout */
  .matchup {
    padding: 20px 16px 16px;
  }
  .teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
  }
  .team {
    flex: 1;
    text-align: center;
  }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 18px;
    line-height: 1.15;
    text-transform: uppercase;
  }
  .team.monument .team-name { color: var(--gold); }
  .team.opponent .team-name { color: var(--text); }
  .team-label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .vs {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 22px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .match-note {
    font-size: 12px; color: var(--text-dim);
    text-align: center;
    padding: 0 4px;
    line-height: 1.4;
  }

  /* ── ACTION BUTTONS ── */
  .actions {
    padding: 0 16px 16px;
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 14px 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 18px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: transform 0.1s, filter 0.15s;
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-sub { font-size: 11px; font-weight: 600; opacity: 0.75; font-family: 'Barlow', sans-serif; text-transform: none; letter-spacing: 0; }
  .btn-win  { background: var(--green); color: #031a0c; }
  .btn-win:hover  { filter: brightness(1.1); }
  .btn-loss { background: var(--red);   color: #1a0303; }
  .btn-loss:hover { filter: brightness(1.1); }

  /* ── POSITION SELECT ── */
  .select-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .select-header {
    background: var(--surface2);
    padding: 14px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    color: var(--gold); text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .select-q {
    padding: 14px 16px 8px;
    font-size: 15px; color: var(--text);
    font-weight: 500; line-height: 1.4;
  }
  .select-opts {
    padding: 6px 16px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .btn-opt {
    padding: 16px 10px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 20px;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    text-align: center;
  }
  .btn-opt .opt-sub { display: block; font-size: 11px; font-weight: 500; color: var(--text-dim); font-family: 'Barlow', sans-serif; margin-top: 3px; }
  .btn-opt:hover { border-color: var(--gold); background: #1a2e46; transform: scale(1.02); }

  /* ── UPCOMING ── */
  .upcoming {
    padding: 0 16px 16px;
  }
  .upcoming-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .upcoming-item {
    padding: 10px 14px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .upcoming-item + .upcoming-item { margin-top: 6px; }
  .up-phase {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 12px;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .up-cond { font-size: 12px; color: var(--muted); }
  .up-win  { color: var(--green); }
  .up-loss { color: var(--red); }

  /* ── DONE SCREEN ── */
  .done-card {
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    border-radius: var(--radius);
    padding: 30px 20px;
    text-align: center;
  }
  .done-medal {
    font-size: 56px; margin-bottom: 12px;
  }
  .done-place {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 38px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .done-label {
    font-size: 14px; color: var(--text-dim);
    margin-top: 6px;
  }
  .btn-reset {
    margin-top: 22px;
    padding: 12px 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    letter-spacing: 0.5px; text-transform: uppercase;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .btn-reset:hover { border-color: var(--gold); color: var(--gold); }

  /* ── INFO PILL ── */
  .info-pill {
    margin: 0 16px 12px;
    padding: 9px 14px;
    background: #0e1f32;
    border-left: 3px solid var(--blue);
    border-radius: 6px;
    font-size: 12px; color: var(--text-dim);
    line-height: 1.5;
  }
  .info-pill strong { color: var(--text); }

  footer {
    margin: 24px 16px 16px;
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    text-align: center;
  }

  @media (min-width: 500px) {
    body { max-width: 500px; margin: 0 auto; }
    header { border-radius: 0; }
  }
</style>

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════

let state = {
  current: 'pd1',
  history: []   // [{id, result, label}]
};

function save() {
  try { localStorage.setItem('monument26', JSON.stringify(state)); } catch(e){}
}
function load() {
  try {
    const s = localStorage.getItem('monument26');
    if (s) state = JSON.parse(s);
  } catch(e){}
}

function track(category, action, name) {
  try { window._paq && _paq.push(['trackEvent', category, action, name]); } catch(e) {}
}

function advance(id, result, label) {
  const node = NODES[id];
  state.history.push({ id, result, label });
  const next = result === 'win' ? node.onWin : (result === 'loss' ? node.onLoss : node.options.find(o=>o.label===result)?.next || node.options[0].next);
  state.current = next;
  track('Match Result', result === 'win' ? 'Win' : 'Loss', node.phase);
  // If landing on a done node, track the final placement
  const nextNode = NODES[next];
  if (nextNode && nextNode.type === 'done') {
    track('Tournament', 'Final Placement', nextNode.place);
  }
  save();
  render();
}

function advanceSelect(currentId, optLabel, nextId) {
  state.history.push({ id: currentId, result: 'select', label: optLabel });
  state.current = nextId;
  const node = NODES[currentId];
  track('Pool Position', node.phase, optLabel);
  save();
  render();
}

function undo() {
  if (state.history.length === 0) return;
  const last = state.history.pop();
  state.current = last.id;
  track('Navigation', 'Undo', NODES[last.id]?.phase || last.id);
  save();
  render();
}

function askReset() {
  state.confirmReset = true;
  render();
}
function cancelReset() {
  state.confirmReset = false;
  render();
}
function reset() {
  track('Navigation', 'Reset', 'Start Over');
  state = { current: 'pd1', history: [] };
  save();
  render();
}

// ════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════

function render() {
  const app = document.getElementById('app');
  const node = NODES[state.current];
  let html = '';

  // Journey strip
  if (state.history.length > 0) {
    html += `<div class="journey">
      <div class="journey-title">Your journey so far</div>
      <div class="journey-list">`;
    state.history.forEach((h, i) => {
      const n = NODES[h.id];
      const isLast = i === state.history.length - 1;
      let cls = h.result === 'win' ? 'win' : h.result === 'loss' ? 'loss' : 'select-done';
      let badge = h.result === 'win' ? 'WIN' : h.result === 'loss' ? 'LOSS' : 'SET';
      let desc = h.result === 'select' ? `Finished <strong>${h.label}</strong> in Pool ${n.phase.includes('Pool D')?'D':n.phase.includes('Pool E')?'E':'G'}`
                 : `${n.phase} <span style="color:var(--text-dim)">· ${n.day} ${n.time}</span>`;
      html += `<div class="j-item ${cls}">
        <span class="j-badge">${badge}</span>
        <span class="j-text">${desc}</span>
        ${isLast ? `<button class="j-undo" onclick="undo()" title="Undo last result">↩</button>` : ''}
      </div>`;
    });
    html += `</div></div><hr class="divider">`;
  }

  // Current node
  html += `<div class="current-wrap">`;

  if (node.type === 'done') {
    html += renderDone(node);
  } else if (node.type === 'select') {
    html += renderSelect(node);
  } else {
    html += renderMatch(node);
    // Upcoming preview
    html += renderUpcoming(node);
  }

  html += `</div>`;
  app.innerHTML = html;
}

function renderMatch(node) {
  const monHome = node.homeIsMonument;
  const monTeam = `<div class="team monument"><div class="team-name">${node.homeIsMonument ? node.home : node.away}</div><div class="team-label">Monument</div></div>`;
  const oppTeam = `<div class="team opponent"><div class="team-name">${node.homeIsMonument ? node.away : node.home}</div><div class="team-label">Opponent</div></div>`;
  const [left, right] = monHome ? [monTeam, oppTeam] : [oppTeam, monTeam];

  let winNext = NODES[node.onWin];
  let lossNext = NODES[node.onLoss];
  let winLabel = winNext ? (winNext.type==='done' ? winNext.place : winNext.phase) : '';
  let lossLabel = lossNext ? (lossNext.type==='done' ? lossNext.place : lossNext.phase) : '';

  return `
    <div class="card">
      <div class="card-phase">
        <span class="phase-name">${node.phase}</span>
        <span class="phase-time">${node.day} · ${node.time}</span>
      </div>
      <div class="matchup">
        <div class="teams">
          ${left}
          <div class="vs">VS</div>
          ${right}
        </div>
        <div class="match-note">${node.note}</div>
      </div>
      <div class="actions">
        <button class="btn btn-win" onclick="advance('${state.current}','win','')">
          WIN
          <span class="btn-sub">→ ${winLabel}</span>
        </button>
        <button class="btn btn-loss" onclick="advance('${state.current}','loss','')">
          LOSS
          <span class="btn-sub">→ ${lossLabel}</span>
        </button>
      </div>
    </div>`;
}

function renderSelect(node) {
  let optsHtml = node.options.map(o =>
    `<button class="btn-opt" onclick="advanceSelect('${state.current}','${o.label}','${o.next}')">
      ${o.label}
      <span class="opt-sub">${o.sub}</span>
    </button>`
  ).join('');

  return `
    <div class="select-card">
      <div class="select-header">${node.phase}</div>
      <div class="select-q">${node.question}<br><span style="font-size:12px;color:var(--muted)">${node.hint}</span></div>
      <div class="select-opts">${optsHtml}</div>
    </div>`;
}

function renderDone(node) {
  const confirming = state.confirmReset;
  return `
    <div class="done-card">
      <div class="done-medal">${node.medal}</div>
      <div class="done-place" style="color:${node.color}">${node.place}</div>
      <div class="done-label">Hoërskool Monument — Courage Festival 2026</div>
      ${confirming ? `
        <div style="margin-top:20px;padding:14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)">
          <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px">Reset everything and start from match 1?</div>
          <div style="display:flex;gap:10px">
            <button class="btn-reset" style="flex:1;color:var(--red);border-color:var(--red)" onclick="reset()">Yes, reset</button>
            <button class="btn-reset" style="flex:1" onclick="cancelReset()">Cancel</button>
          </div>
        </div>
      ` : `
        <button class="btn-reset" onclick="askReset()">Start Over</button>
      `}
    </div>`;
}

function renderUpcoming(node) {
  const winNext  = NODES[node.onWin];
  const lossNext = NODES[node.onLoss];
  if (!winNext && !lossNext) return '';

  const sameNext = node.onWin === node.onLoss;

  let items = '';
  if (sameNext) {
    const desc = winNext.type === 'select'
      ? `Position select — ${winNext.question}`
      : `${winNext.phase} · ${winNext.day} ${winNext.time}`;
    items = `<div class="upcoming-item"><div class="up-phase">Next Up (either result)</div><div class="up-cond">${desc}</div></div>`;
  } else {
    const wDesc = winNext.type === 'done'
      ? winNext.place
      : `${winNext.phase} · ${winNext.day} ${winNext.time}`;
    const lDesc = lossNext.type === 'done'
      ? lossNext.place
      : `${lossNext.phase} · ${lossNext.day} ${lossNext.time}`;
    items = `
      <div class="upcoming-item">
        <div class="up-phase">If WIN:</div>
        <div class="up-cond up-win">${wDesc}</div>
      </div>
      <div class="upcoming-item">
        <div class="up-phase">If LOSS:</div>
        <div class="up-cond up-loss">${lDesc}</div>
      </div>`;
  }

  return `<div class="upcoming"><div class="upcoming-title">Coming up</div>${items}</div>`;
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
load();
render();
</script>
